<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>業績詳細 - StockViewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1a1d26;
            --text-color: #e0e0e0;
            --border-color: #2d313d;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
        }
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 17, 23, 0.9);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            z-index: 100;
            padding-top: 20px;
            margin-top: -20px;
        }
        .dividend-item span.amount {
            color: #60a5fa;
            font-weight: bold;
        }
        .ext-link {
            padding: 8px 16px;
            background: #1e2433;
            border: 1px solid #3b4255;
            border-radius: 6px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
        }
        .ext-link:hover {
            background: #2d3a5a;
            border-color: #60a5fa;
            color: #fff;
        }
        .stock-info h1 {
            margin: 0;
            font-size: 20px;
        }
        .charts-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .chart-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            height: 350px;
        }
        @media (min-width: 1000px) {
            .charts-container {
                grid-template-columns: repeat(6, 1fr);
            }
            /* 上段: 売上グラフ + 利益グラフ (3+3=6列) */
            #chartsArea > .chart-card:nth-child(1),
            #chartsArea > .chart-card:nth-child(2) {
                grid-column: span 3;
            }
            /* 下段: 配当 + 自己資本比率 + PER (2+2+2=6列) */
            #dividendCard,
            #equityRatioCard,
            #perCard {
                grid-column: span 2;
            }
        }
        .no-data {
            text-align: center;
            padding: 100px;
            color: #888;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- ローディングオーバーレイ -->
    <div id="loadingOverlay">
        <div style="font-size: 18px; color: #60a5fa; margin-bottom: 20px; font-weight: bold;">データを取得中...</div>
        <div style="width: 300px; height: 10px; background: #2d313d; border-radius: 5px; overflow: hidden;">
            <div id="loadingBar" style="width: 0%; height: 100%; background: #60a5fa; transition: width 0.3s ease;"></div>
        </div>
        <div id="loadingText" style="margin-top: 10px; font-size: 12px; color: #888;">初期化中...</div>
    </div>

    <div class="header">
        <div class="stock-info" style="display: flex; flex-direction: column; gap: 8px;">
            <h1 id="stockTitle">銘柄を選択してください</h1>
            <div id="headerBadges" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;"></div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
            <div id="dividendYieldInfo" style="display:flex; align-items:center; gap:24px;">
                <div style="text-align:right;">
                    <div style="font-size:11px; color:#888; margin-bottom:2px;">現在株価</div>
                    <div id="currentPriceDisp" style="font-size:20px; font-weight:700; color:#e0e0e0;">---</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:11px; color:#888; margin-bottom:2px;">配当利回り（会社予想）</div>
                    <div id="dividendYieldDisp" style="font-size:20px; font-weight:700; color:#FFAB00;">--.--%</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:11px; color:#888; margin-bottom:2px;">年間配当（最新）</div>
                    <div id="annualDivDisp" style="font-size:20px; font-weight:700; color:#b3b3b3;">--- 円</div>
                </div>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <a id="headerLinkShareholder" href="#" target="_blank" class="ext-link hidden" style="padding:4px 8px; font-size:11px;">大株主</a>
                <a id="headerLinkIR" href="#" target="_blank" class="ext-link hidden" style="padding:4px 8px; font-size:11px;">IR資料</a>
                <div id="updateTime" style="font-size: 12px; color: #888;"></div>
            </div>
        </div>
    </div>

    <div id="noData" class="no-data">メイン画面で銘柄を選択するとグラフが表示されます</div>

    <!-- 事業内容 -->
    <div id="businessInfoBox" class="hidden" style="
        margin: 0 20px 0 20px;
        padding: 12px 16px;
        background: #1e2130;
        border-left: 3px solid #4a90d9;
        border-radius: 4px;
        font-size: 13px;
        color: #c0c0c0;
        line-height: 1.6;
    ">
        <div id="businessSector" style="font-size:11px; color:#888; margin-bottom:4px;"></div>
        <div id="businessSummaryText"></div>
    </div>

    <div id="chartsArea" class="charts-container hidden">
        <div class="chart-card">
            <canvas id="financeChartLeft"></canvas>
        </div>
        <div class="chart-card">
            <canvas id="financeChartRight"></canvas>
        </div>
        <div class="chart-card" id="dividendCard">
            <canvas id="financeChartDividend"></canvas>
        </div>
        <div class="chart-card" id="equityRatioCard">
            <canvas id="financeChartEquityRatio"></canvas>
        </div>
        <div class="chart-card" id="perCard">
            <canvas id="financeChartPER"></canvas>
        </div>
    </div>

    <!-- 株主優待情報 -->
    <div id="yutaiArea" class="hidden" style="margin: 20px 20px 0 20px; padding: 15px 18px; background: linear-gradient(135deg, #1a2035 0%, #1e2440 100%); border: 1px solid #2d4a7a; border-radius: 8px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #2d4a7a; padding-bottom:10px;">
            <h3 style="margin:0; color:#7eb8f7; font-size:14px; display:flex; align-items:center; gap:8px;">
                <span style="font-size:18px;">🎁</span> 株主優待
            </h3>
            <div id="yutaiMeta" style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;"></div>
        </div>
        <div id="yutaiContent"></div>
    </div>

    <!-- ニュース一覧 -->
    <div id="newsArea" class="hidden" style="margin: 20px; padding: 15px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px;">
        <div style="display:flex; border-bottom:1px solid #333; margin-bottom:12px;">
            <button id="tabKabutan" style="background:transparent; color:#60a5fa; border:none; border-bottom:2px solid #60a5fa; padding:8px 16px; cursor:pointer; font-weight:bold;">株探</button>
            <button id="tabYahoo" style="background:transparent; color:#888; border:none; padding:8px 16px; cursor:pointer;">Yahoo!</button>
            <button id="tabNikkei" style="background:transparent; color:#888; border:none; padding:8px 16px; cursor:pointer;">日経</button>
        </div>
        <ul id="newsListKabutan" style="list-style:none; padding:0; margin:0; font-size:12px; line-height:1.6;"></ul>
        <ul id="newsListYahoo" class="hidden" style="list-style:none; padding:0; margin:0; font-size:12px; line-height:1.6;"></ul>
        <ul id="newsListNikkei" class="hidden" style="list-style:none; padding:0; margin:0; font-size:12px; line-height:1.6;"></ul>
        <div id="newsMoreLink" style="margin-top:12px; text-align:right;">
            <a id="newsMoreAnchor" href="#" target="_blank" style="font-size:11px; color:#60a5fa; text-decoration:none;">ニュースをもっと見る →</a>
        </div>
    </div>

    <!-- 外部リンク -->
    <div id="externalLinksArea" class="hidden" style="margin: 20px; padding: 20px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px;">
        <h3 style="margin-top:0; margin-bottom:16px; font-size:15px; color:#a78bfa; border-bottom:1px solid #333; padding-bottom:10px; display:flex; align-items:center; gap:8px;">
            <span style="font-size:18px;">🔗</span> 各種リンク
        </h3>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a id="linkYahoo" class="ext-link" href="#" target="_blank">Yahoo!ファイナンス</a>
            <a id="linkKabutan" class="ext-link" href="#" target="_blank">株探</a>
            <a id="linkNikkei" class="ext-link" href="#" target="_blank">日経電子版</a>
            <a id="linkKabuyoho" class="ext-link" href="#" target="_blank">株予報</a>
            <a id="linkBuffett" class="ext-link" href="#" target="_blank">バフェットコード</a>
            <a id="linkMinkabu" class="ext-link" href="#" target="_blank">みんかぶ</a>
            <a id="linkTraders" class="ext-link" href="#" target="_blank">トレーダーズ・ウェブ</a>
        </div>
    </div>

    <script>
        window.updateProgress = function(percent, message) {
            const overlay = document.getElementById('loadingOverlay');
            const bar = document.getElementById('loadingBar');
            const text = document.getElementById('loadingText');
            if (overlay) {
                if (percent > 0 && percent < 100) {
                    overlay.style.display = 'flex';
                    overlay.style.opacity = '1';
                }
                bar.style.width = `${percent}%`;
                text.textContent = message;
                if (percent >= 100) {
                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.style.display = 'none', 300);
                    }, 500);
                }
            }
        };

        let leftChart = null;
        let rightChart = null;
        let dividendChart = null;
        let equityRatioChart = null;
        let perChart = null;

        Chart.register(ChartDataLabels);
        Chart.defaults.plugins.datalabels = { display: false }; // デフォルトは非表示

        // 親ウィンドウからのデータ受け取り用関数
        window.updateFinancials = function(symbol, name, data) {
            // ローディング画面を非表示
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.style.display = 'none';

            document.getElementById('noData').classList.add('hidden');
            document.getElementById('chartsArea').classList.remove('hidden');
            document.getElementById('stockTitle').textContent = `${symbol} ${name}`;
            document.getElementById('updateTime').textContent = "最終更新: " + new Date().toLocaleTimeString();

            // 外部リンクの設定
            document.getElementById('externalLinksArea').classList.remove('hidden');
            document.getElementById('linkYahoo').href = `https://finance.yahoo.co.jp/quote/${symbol}.T`;
            document.getElementById('linkKabutan').href = `https://kabutan.jp/stock/?code=${symbol}`;
            document.getElementById('linkNikkei').href = `https://www.nikkei.com/nkd/company/?scode=${symbol}`;
            document.getElementById('linkKabuyoho').href = `https://kabuyoho.jp/reportTop?bcode=${symbol}`;
            document.getElementById('linkBuffett').href = `https://www.buffett-code.com/company/${symbol}/`;
            document.getElementById('linkMinkabu').href = `https://minkabu.jp/stock/${symbol}`;
            document.getElementById('linkTraders').href = `https://www.traders.co.jp/stocks/${symbol}/`;

            // ヘッダーリンク（大株主・IR資料）の設定
            const linkShareholder = document.getElementById('headerLinkShareholder');
            const linkIR = document.getElementById('headerLinkIR');
            linkShareholder.href = `https://www.buffett-code.com/company/${symbol}/mainshareholder`;
            linkIR.href = `https://www.buffett-code.com/company/${symbol}/library`;
            linkShareholder.classList.remove('hidden');
            linkIR.classList.remove('hidden');

            // 株価・配当利回りの表示
            const price = data.currentPrice;
            const divData = data.dividendData;
            if (price && divData && divData.dividends && divData.dividends.length > 0) {
                // 最新の配当額（末尾が予想なら予想を使い、なければ最終実績）
                const lastDiv = divData.dividends[divData.dividends.length - 1];
                document.getElementById('currentPriceDisp').textContent = price.toLocaleString() + ' 円';
                document.getElementById('annualDivDisp').textContent = (lastDiv !== null ? lastDiv : '---') + ' 円';
                if (lastDiv !== null && price > 0) {
                    const yieldPct = (lastDiv / price * 100).toFixed(2);
                    document.getElementById('dividendYieldDisp').textContent = yieldPct + '%';
                } else {
                    document.getElementById('dividendYieldDisp').textContent = '--.-- %';
                }
            } else {
                document.getElementById('currentPriceDisp').textContent = price ? price.toLocaleString() + ' 円' : '---';
                document.getElementById('dividendYieldDisp').textContent = '--.-- %';
                document.getElementById('annualDivDisp').textContent = '--- 円';
            }

            // 事業内容の表示
            const biz = data.businessInfo;
            const bizBox = document.getElementById('businessInfoBox');
            if (biz && biz.summary) {
                document.getElementById('businessSector').textContent = (biz.sector || '') + (biz.fiscal_month ? ` (${biz.fiscal_month})` : '');
                document.getElementById('businessSummaryText').textContent = biz.summary;
                bizBox.classList.remove('hidden');
            } else {
                bizBox.classList.add('hidden');
            }

            // ---- 株主優待の表示 ----
            const yutaiArea = document.getElementById('yutaiArea');
            const yutaiMeta = document.getElementById('yutaiMeta');
            const yutaiContent = document.getElementById('yutaiContent');
            const headerBadges = document.getElementById('headerBadges');
            const y = data.yutaiInfo;

            headerBadges.innerHTML = '';
            yutaiMeta.innerHTML = '';

            // 決算期バッジを最初に追加
            if (biz && biz.fiscal_month) {
                headerBadges.innerHTML += `<span style="background:#1e293b; color:#cbd5e1; font-size:11px; padding:3px 8px; border-radius:12px; border:1px solid #475569;">🏢 決算期: ${biz.fiscal_month}</span>`;
            }

            if (y) {
                // 決算発表予定日バッジ
                if (y.kessan_date) {
                    headerBadges.innerHTML += `<span style="background:#2d2410; color:#fbbf24; font-size:11px; padding:3px 8px; border-radius:12px; border:1px solid #7a5f0a;">📋 決算発表: ${y.kessan_date}</span>`;
                }

                // 権利確定月バッジ
                if (y.kenri_month) {
                    headerBadges.innerHTML += `<span style="background:#1b3a6b; color:#7eb8f7; font-size:11px; padding:3px 8px; border-radius:12px; border:1px solid #2d5fa0;">📅 権利確定月: ${y.kenri_month}</span>`;
                }

                // 権利付き最終日バッジ
                if (y.kenri_lastday) {
                    headerBadges.innerHTML += `<span style="background:#3a1b1b; color:#f87171; font-size:11px; padding:3px 8px; border-radius:12px; border:1px solid #7a2d2d; font-weight:bold;">⚡ 権利付き最終日: ${y.kenri_lastday}</span>`;
                }

                // 最低株数
                if (y.min_shares) {
                    headerBadges.innerHTML += `<span style="background:#1b2e1b; color:#86efac; font-size:11px; padding:3px 8px; border-radius:12px; border:1px solid #2d5f2d;">📊 最低: ${y.min_shares}</span>`;
                }

                // 優待+配当利回り
                if (y.yield_total) {
                    headerBadges.innerHTML += `<span style="background:#1a1a3a; color:#a78bfa; font-size:11px; padding:3px 8px; border-radius:12px; border:1px solid #5f3fa0;">💰 優待+配当利回り: ${y.yield_total}</span>`;
                }
            }

            if (y && y.has_yutai) {
                // 長期保有優遇
                if (y.long_term) {
                    headerBadges.innerHTML += `<span style="color:#fb923c; font-size:11px;">⭐ 長期保有優遇あり</span>`;
                }

                // 優待内容
                let contentHtml = '';
                if (y.category) {
                    contentHtml += `<div style="margin-bottom:6px; color:#a78bfa; font-size:11px;">🏷 カテゴリ: ${y.category}</div>`;
                }
                if (y.content) {
                    contentHtml += `<div style="font-size:12px; color:#d0d0d0; line-height:1.7; padding:8px; background:rgba(0,0,0,0.2); border-radius:4px;">${y.content}</div>`;
                }

                // 株探リンク
                const code = document.getElementById('stockTitle').textContent.split(' ')[0];
                contentHtml += `<div style="margin-top:8px; text-align:right;"><a href="https://kabutan.jp/stock/yutai?code=${code}" target="_blank" style="font-size:11px; color:#60a5fa; text-decoration:none;">株探で詳細を見る →</a></div>`;

                yutaiContent.innerHTML = contentHtml;
                yutaiArea.classList.remove('hidden');
            } else {
                yutaiArea.classList.add('hidden');
            }

            // ---- ニュースの表示 ----
            const newsArea = document.getElementById('newsArea');
            const newsListKabutan = document.getElementById('newsListKabutan');
            const newsListYahoo = document.getElementById('newsListYahoo');
            const newsListNikkei = document.getElementById('newsListNikkei');
            newsListKabutan.innerHTML = '';
            newsListYahoo.innerHTML = '';
            newsListNikkei.innerHTML = '';

            const renderNews = (listElement, newsData) => {
                newsData.forEach(n => {
                    const li = document.createElement('li');
                    li.style.marginBottom = '6px';
                    
                    let color = '#ccc';
                    let fontWeight = 'normal';
                    if (n.importance === 'positive') {
                        color = '#4ade80'; // 緑
                        fontWeight = 'bold';
                    } else if (n.importance === 'negative') {
                        color = '#f87171'; // 赤
                        fontWeight = 'bold';
                    } else if (n.importance === 'important') {
                        color = '#60a5fa'; // 青
                        fontWeight = 'bold';
                    }

                    li.innerHTML = `
                        <span style="color:#888; margin-right:8px; display:inline-block; width:110px;">${n.date}</span>
                        <span style="color:#aaa; margin-right:8px; font-size:11px; border:1px solid #444; padding:1px 4px; border-radius:3px;">${n.category}</span>
                        <a href="${n.link}" target="_blank" style="color:${color}; font-weight:${fontWeight}; text-decoration:none; transition: color 0.2s;">
                            ${n.title}
                        </a>
                    `;
                    listElement.appendChild(li);
                });
            };

            const hasKabutan = data.newsInfo && data.newsInfo.length > 0;
            const hasYahoo = data.yahooNewsInfo && data.yahooNewsInfo.length > 0;
            const hasNikkei = data.nikkeiNewsInfo && data.nikkeiNewsInfo.length > 0;

            if (hasKabutan) renderNews(newsListKabutan, data.newsInfo);
            if (hasYahoo) renderNews(newsListYahoo, data.yahooNewsInfo);
            if (hasNikkei) renderNews(newsListNikkei, data.nikkeiNewsInfo);

            if (hasKabutan || hasYahoo || hasNikkei) {
                newsArea.classList.remove('hidden');
                
                // タブ切り替えロジック
                const tabKabutan = document.getElementById('tabKabutan');
                const tabYahoo = document.getElementById('tabYahoo');
                const tabNikkei = document.getElementById('tabNikkei');
                
                // 件数の表示
                tabKabutan.textContent = `株探 (${data.newsInfo?.length || 0})`;
                tabYahoo.textContent = `Yahoo! (${data.yahooNewsInfo?.length || 0})`;
                tabNikkei.textContent = `日経 (${data.nikkeiNewsInfo?.length || 0})`;
                
                const activateTab = (tabName) => {
                    const isKabutan = tabName === 'kabutan';
                    const isYahoo = tabName === 'yahoo';
                    const isNikkei = tabName === 'nikkei';

                    tabKabutan.style.color = isKabutan ? '#60a5fa' : '#888';
                    tabKabutan.style.borderBottom = isKabutan ? '2px solid #60a5fa' : 'none';
                    tabKabutan.style.fontWeight = isKabutan ? 'bold' : 'normal';
                    
                    tabYahoo.style.color = isYahoo ? '#ff4d4f' : '#888';
                    tabYahoo.style.borderBottom = isYahoo ? '2px solid #ff4d4f' : 'none';
                    tabYahoo.style.fontWeight = isYahoo ? 'bold' : 'normal';

                    tabNikkei.style.color = isNikkei ? '#facc15' : '#888'; // Nikkei yellow/gold
                    tabNikkei.style.borderBottom = isNikkei ? '2px solid #facc15' : 'none';
                    tabNikkei.style.fontWeight = isNikkei ? 'bold' : 'normal';

                    if (isKabutan) {
                        newsListKabutan.classList.remove('hidden');
                        newsListYahoo.classList.add('hidden');
                        newsListNikkei.classList.add('hidden');
                        document.getElementById('newsMoreAnchor').href = `https://kabutan.jp/stock/news?code=${symbol}`;
                        document.getElementById('newsMoreAnchor').textContent = '株探でニュースをもっと見る →';
                    } else if (isYahoo) {
                        newsListKabutan.classList.add('hidden');
                        newsListYahoo.classList.remove('hidden');
                        newsListNikkei.classList.add('hidden');
                        document.getElementById('newsMoreAnchor').href = `https://finance.yahoo.co.jp/quote/${symbol}.T/news`;
                        document.getElementById('newsMoreAnchor').textContent = 'Yahoo!ファイナンスでニュースをもっと見る →';
                    } else {
                        newsListKabutan.classList.add('hidden');
                        newsListYahoo.classList.add('hidden');
                        newsListNikkei.classList.remove('hidden');
                        document.getElementById('newsMoreAnchor').href = `https://www.nikkei.com/nkd/company/news/?scode=${symbol}`;
                        document.getElementById('newsMoreAnchor').textContent = '日経電子版でニュースをもっと見る →';
                    }
                };

                tabKabutan.onclick = () => activateTab('kabutan');
                tabYahoo.onclick = () => activateTab('yahoo');
                tabNikkei.onclick = () => activateTab('nikkei');

                // デフォルトの表示優先順位: 株探 -> 日経 -> Yahoo
                if (hasKabutan) activateTab('kabutan');
                else if (hasNikkei) activateTab('nikkei');
                else activateTab('yahoo');
            } else {
                newsArea.classList.add('hidden');
            }

            renderCharts(data);
        };

        function renderCharts(data) {
            if (leftChart) leftChart.destroy();
            if (rightChart) rightChart.destroy();
            if (dividendChart) dividendChart.destroy();

            Chart.defaults.color = '#888';

            // 予測データがある場合の処理
            const displayLabels = [...data.labels];
            const displayRevenues = [...data.revenues];
            const displayGrossProfits = [...data.grossProfits];
            const displayOpIncomes = [...data.opIncomes];
            const displayNetIncomes = [...data.netIncomes];

            const displayGrossMargins = [...data.grossMargins];
            const displayOpMargins = [...data.opMargins];
            const displayNetMargins = [...data.netMargins];
            const displayRoes = [...data.roes];

            const bgColors = data.revenues.map(() => '#757575');

            if (data.forecast) {
                // ラベルから来期を推測（簡易的）
                const lastLabel = data.labels[data.labels.length - 1];
                const lastParts = lastLabel.split('/');
                if (lastParts.length === 2) {
                    const nextYear = parseInt(lastParts[0]) + 1;
                    displayLabels.push(nextYear + "/" + lastParts[1] + "(予)");
                } else {
                    displayLabels.push("来期(予)");
                }
                
                displayRevenues.push(data.forecast);
                bgColors.push('#444'); // 予測値は少し暗い/薄い色にする

                // 線グラフと右グラフの予測分は null (表示しない)
                displayNetMargins.push(null);
                displayRoes.push(null);
                displayGrossProfits.push(null);
                displayOpIncomes.push(null);
                displayNetIncomes.push(null);
            }

            const ctxLeft = document.getElementById('financeChartLeft').getContext('2d');
            leftChart = new Chart(ctxLeft, {
                type: 'bar',
                data: {
                    labels: displayLabels,
                    datasets: [
                        { label: '売上高 (百万円)', data: displayRevenues, backgroundColor: bgColors, yAxisID: 'y', order: 1 },
                        { 
                            label: '当期利益率 (%)', data: displayNetMargins, type: 'line', borderColor: '#FFAB00', backgroundColor: '#FFAB00', yAxisID: 'y1', tension: 0.1, order: 0,
                            datalabels: { display: true, align: 'top', offset: 8, color: '#FFAB00', font: { size: 10, weight: 'bold' }, formatter: (v) => v !== null ? v.toFixed(1) : '' }
                        },
                        { 
                            label: 'ROE (%)', data: displayRoes, type: 'line', borderColor: '#00C853', backgroundColor: '#00C853', yAxisID: 'y1', tension: 0.1, order: 0,
                            datalabels: { display: true, align: 'bottom', offset: 8, color: '#00C853', font: { size: 10, weight: 'bold' }, formatter: (v) => v !== null ? v.toFixed(1) : '' }
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: '売上高 (百万円) & 収益性 (%)', align: 'start', color: '#ccc' },
                        legend: { position: 'bottom', labels: { boxWidth: 10, usePointStyle: true, font: { size: 10 } } }
                    },
                    scales: {
                        y: { 
                            position: 'left', 
                            grid: { color: '#333' },
                            title: { display: true, text: '売上高', color: '#888', font: { size: 10 } }
                        },
                        y1: { 
                            position: 'right', 
                            grace: '10%',
                            grid: { 
                                drawOnChartArea: true,
                                color: (context) => context.tick.value === 0 ? '#ffffff' : 'rgba(255, 255, 255, 0.05)',
                                lineWidth: (context) => context.tick.value === 0 ? 2 : 1
                            },
                            title: { display: true, text: '収益性/ROE (%)', color: '#888', font: { size: 10 } }
                        }
                    }
                }
            });

            const ctxRight = document.getElementById('financeChartRight').getContext('2d');
            rightChart = new Chart(ctxRight, {
                type: 'bar',
                data: {
                    labels: displayLabels,
                    datasets: [
                        { label: '営業利益', data: displayOpIncomes, backgroundColor: '#FF5252' },
                        { label: '当期純利益', data: displayNetIncomes, backgroundColor: '#FFAB00' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: '利益 (百万円)', align: 'start', color: '#ccc' },
                        legend: { position: 'bottom', labels: { boxWidth: 10, usePointStyle: true, font: { size: 10 } } }
                    },
                    scales: { 
                        y: { 
                            grace: '10%',
                            grid: { 
                                color: (context) => context.tick.value === 0 ? '#ffffff' : '#333',
                                lineWidth: (context) => context.tick.value === 0 ? 2 : 1
                            } 
                        } 
                    }
                }
            });

            // Nikkei Dividend Chart
            if (data.dividendData && data.dividendData.labels && data.dividendData.labels.length > 0) {
                document.getElementById('dividendCard').classList.remove('hidden');
                const ctxDiv = document.getElementById('financeChartDividend').getContext('2d');
                dividendChart = new Chart(ctxDiv, {
                    type: 'bar',
                    data: {
                        labels: data.dividendData.labels,
                        datasets: [
                            {
                                label: '配当 (円)',
                                data: data.dividendData.dividends,
                                backgroundColor: '#b3b3b3',
                                yAxisID: 'y',
                                order: 1,
                                datalabels: {
                                    display: true,
                                    align: 'top',
                                    anchor: 'end',
                                    offset: 0,
                                    color: '#e0e0e0',
                                    font: (context) => {
                                        const label = context.chart.data.labels[context.dataIndex];
                                        return { size: 10, weight: label.includes('予') ? 'normal' : 'bold' };
                                    },
                                    formatter: (v) => v !== null ? v : ''
                                }
                            },
                            {
                                label: '配当性向 (%)',
                                data: data.dividendData.payouts,
                                type: 'line',
                                borderColor: '#009900',
                                backgroundColor: '#009900',
                                yAxisID: 'y1',
                                tension: 0.1,
                                order: 0
                            },

                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: { display: true, text: '配当推移（円、%）', align: 'start', color: '#ccc' },
                            legend: { position: 'bottom', labels: { boxWidth: 10, usePointStyle: true, font: { size: 10 } } },
                            datalabels: { display: false }
                        },
                        scales: {
                            y: {
                                position: 'left',
                                grace: '10%',
                                grid: { color: '#333' },
                                title: { display: true, text: '配当 (円)', color: '#888', font: { size: 10 } }
                            },
                            y1: {
                                position: 'right',
                                grace: '10%',
                                grid: { drawOnChartArea: false },
                                title: { display: true, text: '配当性向 (%)', color: '#888', font: { size: 10 } }
                            }
                        }
                    }
                });
            } else {
                document.getElementById('dividendCard').classList.add('hidden');
            }

            // ---- 自己資本比率グラフ ----
            if (equityRatioChart) equityRatioChart.destroy();
            const erData = (data.equityRatios || []).filter(v => v !== null);
            if (data.equityRatios && erData.length > 0) {
                document.getElementById('equityRatioCard').classList.remove('hidden');
                const ctxER = document.getElementById('financeChartEquityRatio').getContext('2d');
                equityRatioChart = new Chart(ctxER, {
                    type: 'bar',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: '自己資本比率 (%)',
                            data: data.equityRatios,
                            backgroundColor: data.equityRatios.map(v => v !== null ? 'rgba(99, 179, 237, 0.7)' : 'transparent'),
                            borderColor: 'rgba(99, 179, 237, 1)',
                            borderWidth: 1,
                            datalabels: {
                                display: true,
                                align: 'top',
                                anchor: 'end',
                                offset: 0,
                                color: '#63b3ed',
                                font: { size: 10, weight: 'bold' },
                                formatter: (v) => v !== null ? v.toFixed(1) : ''
                            }
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: { display: true, text: '自己資本比率 (%)', align: 'start', color: '#ccc' },
                            legend: { display: false },
                        },
                        scales: {
                            y: {
                                grace: '10%',
                                min: 0,
                                grid: { color: '#333' },
                                title: { display: true, text: '(%)', color: '#888', font: { size: 10 } }
                            }
                        }
                    }
                });
            } else {
                document.getElementById('equityRatioCard').classList.add('hidden');
            }

            // ---- PERグラフ (現在株価 / EPS) ----
            if (perChart) perChart.destroy();
            const divD = data.dividendData;
            const price = data.currentPrice;
            if (divD && divD.eps && price) {
                // EPSデータがある年度のみ表示
                const perLabels = [];
                const perValues = [];
                divD.labels.forEach((lbl, i) => {
                    const eps = divD.eps[i];
                    if (eps && eps > 0 && !lbl.endsWith('予')) {
                        perLabels.push(lbl);
                        perValues.push(parseFloat((price / eps).toFixed(1)));
                    }
                });
                if (perValues.length > 0) {
                    document.getElementById('perCard').classList.remove('hidden');
                    const ctxPER = document.getElementById('financeChartPER').getContext('2d');
                    perChart = new Chart(ctxPER, {
                        type: 'bar',
                        data: {
                            labels: perLabels,
                            datasets: [{
                                label: 'PER (倍)',
                                data: perValues,
                                backgroundColor: 'rgba(246, 173, 85, 0.7)',
                                borderColor: 'rgba(246, 173, 85, 1)',
                                borderWidth: 1,
                                datalabels: {
                                    display: true,
                                    align: 'top',
                                    anchor: 'end',
                                    offset: 0,
                                    color: '#f6ad55',
                                    font: { size: 10, weight: 'bold' },
                                    formatter: (v) => v !== null ? v.toFixed(1) : ''
                                }
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                title: { display: true, text: `PER (倍) ※現在株価${price.toLocaleString()}円で計算`, align: 'start', color: '#ccc' },
                                legend: { display: false },
                            },
                            scales: {
                                y: {
                                    grace: '10%',
                                    min: 0,
                                    grid: { color: '#333' },
                                    title: { display: true, text: '(倍)', color: '#888', font: { size: 10 } }
                                }
                            }
                        }
                    });
                } else {
                    document.getElementById('perCard').classList.add('hidden');
                }
            } else {
                document.getElementById('perCard').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
