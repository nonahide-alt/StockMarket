<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockViewer - Premium Finance Panel</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar: Stock List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="trending-up" class="logo-icon"></i>
                <h1 class="logo-text">StockViewer</h1>
            </div>
            <!-- Stock List Container -->
            <div id="stockListContainer" class="stock-list-container">
                <ul id="stockList" class="stock-list">
                    <!-- Stocks will be populated dynamically -->
                </ul>
            </div>
            <div class="sidebar-footer">
                <div class="footer-item" id="openSettingsBtn" title="設定">
                    <i data-lucide="settings" class="footer-icon"></i>
                    <span>設定</span>
                </div>
                <div class="footer-item">
                    <i data-lucide="keyboard" class="footer-icon"></i>
                    <span>操作ヘルプ</span>
                </div>
            </div>
        </aside>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal-overlay hidden">
            <div class="modal-container">
                <div class="modal-header">
                    <h3>システム設定</h3>
                    <button class="close-modal" id="closeSettingsBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="settings-section">
                        <h4>銘柄データの管理</h4>
                        <p class="settings-desc">CSVファイルを使用して銘柄リストを一括インポート・エクスポートできます。</p>
                        
                        <div class="settings-actions">
                            <button id="exportCSVBtn" class="action-btn secondary">
                                <i data-lucide="download"></i> CSVエクスポート
                            </button>
                            <button id="importCSVBtn" class="action-btn primary">
                                <i data-lucide="upload"></i> CSVインポート
                            </button>
                            <input type="file" id="csvFileInput" accept=".csv" class="hidden">
                        </div>
                        
                        <div id="importStatus" class="import-status"></div>
                    </div>
                    
                    <div class="settings-divider"></div>
                    
                    <div class="settings-section">
                        <h4>データの初期化</h4>
                        <p class="settings-desc">インポートしたすべてのカスタムデータを削除し、デフォルトの銘柄リストに戻します。</p>
                        <button id="resetDataBtn" class="action-btn danger">
                            <i data-lucide="trash-2"></i> デフォルトに戻す
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header: Stock Information -->
            <header class="stock-header">
                <div class="header-left">
                    <div class="stock-meta">
                        <span id="stockSymbol" class="stock-symbol">----</span>
                        <span id="stockExchange" class="stock-exchange">TSE</span>
                    </div>
                    <h2 id="stockName" class="stock-name">データを読み込んでいます...</h2>
                    <!-- Chart Tabs (Moved here) -->
                    <div class="chart-tabs">
                        <button class="tab-btn active" data-range="2y">2年</button>
                        <button class="tab-btn" data-range="10y">10年</button>
                    </div>
                </div>
                <div class="header-right">
                    <div class="price-container">
                        <div class="current-price">
                            <span id="currentValue" class="value">0</span>
                            <span class="currency">JPY</span>
                        </div>
                        <div id="priceChange" class="price-change neutral">
                            <i id="changeIcon" data-lucide="minus"></i>
                            <span id="changeValue">0 (0.00%)</span>
                        </div>
                    </div>
                    <div class="time-container">
                        <i data-lucide="clock" class="time-icon"></i>
                        <span id="updateTime" class="update-time">--/--/-- --:--</span>
                    </div>
                </div>
            </header>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <div class="loading-text">株価データを取得中...</div>
            </div>

            <!-- Chart Container -->
            <div id="chartContainer" class="chart-container">
                <!-- Legend (Moving Averages) -->
                <div id="chartLegend" class="chart-legend">
                    <div class="legend-item"><span class="legend-color ma10"></span> MA 10</div>
                    <div class="legend-item"><span class="legend-color ma20"></span> MA 20</div>
                    <div class="legend-item"><span class="legend-color ma30"></span> MA 30</div>
                    <div class="legend-item"><span class="legend-color ma75"></span> MA 75</div>
                    <div class="legend-item"><span class="legend-color ma200"></span> MA 200</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- App Logic -->
    <script src="app.js?v=9"></script>
</body>
</html>
